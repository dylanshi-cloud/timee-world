<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGlow" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#F9E154" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F9E154" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE25E"/>
      <stop offset="35%" stop-color="#F7C530"/>
      <stop offset="100%" stop-color="#D4920A"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#D9E8F5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#B8D0E8" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="eyeShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4E8F8"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="80" fill="url(#bgGlow)"/>

  <!-- === WINGS (behind body, angled for flying pose) === -->
  <!-- Left (back) wing - more upright, behind -->
  <g transform="translate(105,85) rotate(-55) translate(-105,-85)">
    <ellipse cx="82" cy="72" rx="40" ry="18" fill="url(#wingGrad)" stroke="#B8C8D8" stroke-width="0.6"/>
    <path d="M55 68 Q65 56 85 62" fill="none" stroke="#FFF" stroke-width="1.8" opacity="0.5"/>
    <path d="M60 76 Q72 66 88 70" fill="none" stroke="#FFF" stroke-width="1.2" opacity="0.3"/>
  </g>
  <!-- Right (front) wing - more visible, forward -->
  <g transform="translate(98,88) rotate(-35) translate(-98,-88)">
    <ellipse cx="60" cy="78" rx="42" ry="20" fill="url(#wingGrad)" stroke="#B8C8D8" stroke-width="0.6"/>
    <path d="M30 74 Q45 60 68 68" fill="none" stroke="#FFF" stroke-width="2" opacity="0.5"/>
    <path d="M35 82 Q50 72 72 76" fill="none" stroke="#FFF" stroke-width="1.2" opacity="0.3"/>
    <!-- Wing vein detail -->
    <path d="M55 72 Q48 64 40 62" fill="none" stroke="#D0DCE8" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- === BODY (flying pose - tilted left-forward) === -->
  <g transform="translate(-8,12)">
    <ellipse cx="100" cy="108" rx="36" ry="40" fill="url(#bodyGrad)" stroke="#B8860B" stroke-width="0.8"/>
    <!-- Body highlight -->
    <ellipse cx="88" cy="98" rx="10" ry="22" fill="#FFF" opacity="0.15" transform="rotate(-10,88,98)"/>
  </g>

  <!-- === STRIPES === -->
  <g transform="translate(-8,12)" stroke-linecap="round">
    <path d="M65 96 Q100 86 135 96" fill="none" stroke="#3D2B1F" stroke-width="5.5" transform="rotate(-3,100,96)"/>
    <path d="M65 108 Q100 99 135 108" fill="none" stroke="#3D2B1F" stroke-width="5.5" transform="rotate(-2,100,108)"/>
    <path d="M67 120 Q100 112 133 120" fill="none" stroke="#3D2B1F" stroke-width="5" transform="rotate(-2,100,120)"/>
  </g>

  <!-- === STINGER === -->
  <path d="M92 148 L88 160 L96 160 Z" fill="#3D2B1F" transform="translate(-8,12)"/>

  <!-- === HEAD (slightly forward, left-tilted) === -->
  <g transform="translate(-12,6)">
    <circle cx="100" cy="78" r="24" fill="#3D2B1F"/>
    <!-- Head highlight -->
    <ellipse cx="93" cy="71" rx="10" ry="8" fill="#FFF" opacity="0.08"/>
  </g>

  <!-- === EYES (big shiny white eyes, left-facing) === -->
  <!-- Left eye (farther, slightly smaller) -->
  <ellipse cx="84" cy="78" rx="7" ry="9" fill="url(#eyeShine)" stroke="#2A2210" stroke-width="0.5"/>
  <ellipse cx="83" cy="76" rx="3.5" ry="5" fill="#3D2B1F"/>
  <circle cx="82" cy="74" r="1.8" fill="#FFF"/>

  <!-- Right eye (closer, bigger - the bright visible one) -->
  <ellipse cx="107" cy="80" rx="8.5" ry="10" fill="url(#eyeShine)" stroke="#2A2210" stroke-width="0.5"/>
  <ellipse cx="106" cy="78" rx="4.5" ry="6.5" fill="#3D2B1F"/>
  <circle cx="105" cy="75" r="2.5" fill="#FFF"/>
  <!-- Extra eye shine dot -->
  <circle cx="108" cy="80" r="1.2" fill="#FFF" opacity="0.6"/>

  <!-- === CHEEKS === -->
  <ellipse cx="78" cy="88" rx="5" ry="3.5" fill="#E8A87C" opacity="0.35"/>
  <ellipse cx="120" cy="90" rx="5" ry="3.5" fill="#E8A87C" opacity="0.35"/>

  <!-- === SMILE === -->
  <path d="M90 92 Q95 98 102 93" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>

  <!-- === ANTENNAE === -->
  <g stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M90 56 Q82 38 72 26"/>
    <circle cx="72" cy="26" r="4.5" fill="#F4C430" stroke="none"/>
    <path d="M108 56 Q114 36 118 24"/>
    <circle cx="118" cy="24" r="4.5" fill="#F4C430" stroke="none"/>
  </g>
</svg>
