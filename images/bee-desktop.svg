<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6CC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8D5B7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7DC6F"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8925A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C8925A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- subtle glow behind -->
  <circle cx="100" cy="100" r="90" fill="url(#glow)"/>
  <!-- Left wing -->
  <ellipse cx="65" cy="65" rx="40" ry="24" fill="url(#wingGrad)" stroke="#E8D5B7" stroke-width="0.8" transform="rotate(-25,65,65)"/>
  <path d="M40 58 Q55 48 75 55" fill="none" stroke="#D4C4A0" stroke-width="0.5" opacity="0.5"/>
  <!-- Right wing -->
  <ellipse cx="135" cy="65" rx="40" ry="24" fill="url(#wingGrad)" stroke="#E8D5B7" stroke-width="0.8" transform="rotate(25,135,65)"/>
  <path d="M125 58 Q145 48 160 55" fill="none" stroke="#D4C4A0" stroke-width="0.5" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="32" ry="42" fill="url(#bodyGrad)" stroke="#C8925A" stroke-width="1"/>
  <!-- Stripes -->
  <path d="M69 92 Q100 86 131 92" fill="none" stroke="#3D2B1F" stroke-width="4" stroke-linecap="round" transform="rotate(-3,100,92)"/>
  <path d="M70 105 Q100 99 130 105" fill="none" stroke="#3D2B1F" stroke-width="4" stroke-linecap="round" transform="rotate(-2,100,105)"/>
  <path d="M73 118 Q100 112 127 118" fill="none" stroke="#3D2B1F" stroke-width="3.5" stroke-linecap="round" transform="rotate(-1,100,118)"/>
  <!-- Stinger -->
  <path d="M100 150 L96 162 L104 162 Z" fill="#3D2B1F"/>
  <!-- Head -->
  <circle cx="100" cy="82" r="22" fill="#3D2B1F"/>
  <!-- Eye shine -->
  <ellipse cx="92" cy="78" rx="4" ry="5" fill="#fff" opacity="0.9"/>
  <ellipse cx="108" cy="78" rx="4" ry="5" fill="#fff" opacity="0.9"/>
  <circle cx="93" cy="77" r="1.5" fill="#3D2B1F"/>
  <circle cx="109" cy="77" r="1.5" fill="#3D2B1F"/>
  <!-- Antennae -->
  <path d="M92 62 Q85 40 78 32" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
  <circle cx="78" cy="32" r="3.5" fill="#C8925A"/>
  <path d="M108 62 Q115 40 122 32" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
  <circle cx="122" cy="32" r="3.5" fill="#C8925A"/>
  <!-- Light reflection on body -->
  <ellipse cx="90" cy="95" rx="10" ry="18" fill="rgba(255,255,255,0.15)" transform="rotate(-10,90,95)"/>
</svg>
