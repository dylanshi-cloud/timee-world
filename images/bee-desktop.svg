<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bodyGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F9E154" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F9E154" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FADE3E"/>
      <stop offset="40%" stop-color="#F4C430"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E8E0D0" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Glow -->
  <circle cx="100" cy="105" r="80" fill="url(#bodyGlow)"/>

  <!-- WINGS (behind body, angled outward) -->
  <!-- Left wing -->
  <g transform="translate(100,95) rotate(-50) translate(-100,-95)">
    <ellipse cx="65" cy="80" rx="36" ry="20" fill="url(#wingGrad)" stroke="#D4C8B8" stroke-width="0.5"/>
    <path d="M42 80 Q55 68 72 75" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M48 86 Q58 78 74 82" fill="none" stroke="#FFF" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Right wing -->
  <g transform="translate(100,95) rotate(50) translate(-100,-95)">
    <ellipse cx="135" cy="80" rx="36" ry="20" fill="url(#wingGrad)" stroke="#D4C8B8" stroke-width="0.5"/>
    <path d="M128 80 Q115 68 98 75" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.5"/>
    <path d="M122 86 Q112 78 96 82" fill="none" stroke="#FFF" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- BODY (rounded, front-facing oval) -->
  <ellipse cx="100" cy="115" rx="34" ry="38" fill="url(#bodyGrad)" stroke="#B8860B" stroke-width="0.8"/>

  <!-- Body highlight -->
  <ellipse cx="86" cy="104" rx="10" ry="20" fill="#FFF" opacity="0.12" transform="rotate(-5,86,104)"/>

  <!-- STRIPES (horizontal across front) -->
  <g stroke-linecap="round">
    <path d="M67 100 Q100 92 133 100" fill="none" stroke="#3D2B1F" stroke-width="5" transform="rotate(-2,100,100)"/>
    <path d="M67 112 Q100 104 133 112" fill="none" stroke="#3D2B1F" stroke-width="5.5" transform="rotate(-1,100,112)"/>
    <path d="M69 124 Q100 117 131 124" fill="none" stroke="#3D2B1F" stroke-width="5" transform="rotate(-1,100,124)"/>
  </g>

  <!-- STINGER -->
  <path d="M100 151 L97 163 L103 163 Z" fill="#3D2B1F"/>

  <!-- HEAD (circle, front-facing) -->
  <circle cx="100" cy="82" r="24" fill="#3D2B1F"/>
  <!-- Head highlight -->
  <circle cx="96" cy="78" r="12" fill="#FFF" opacity="0.06"/>

  <!-- EYES (two big white circles, front-facing!) -->
  <ellipse cx="89" cy="80" rx="7" ry="8" fill="#FFF"/>
  <ellipse cx="111" cy="80" rx="7" ry="8" fill="#FFF"/>
  <!-- Pupils -->
  <circle cx="90" cy="79" r="3.5" fill="#3D2B1F"/>
  <circle cx="112" cy="79" r="3.5" fill="#3D2B1F"/>
  <!-- Eye shine -->
  <circle cx="88" cy="77" r="1.5" fill="#FFF"/>
  <circle cx="110" cy="77" r="1.5" fill="#FFF"/>

  <!-- CHEEKS (blush, like emoji) -->
  <ellipse cx="78" cy="88" rx="6" ry="4" fill="#E8A87C" opacity="0.35"/>
  <ellipse cx="122" cy="88" rx="6" ry="4" fill="#E8A87C" opacity="0.35"/>

  <!-- SMILE (cute "w" shape like emoji) -->
  <path d="M90 92 Q94 98 100 94 Q106 98 110 92" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ANTENNAE -->
  <g stroke="#3D2B1F" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M90 60 Q84 42 76 28"/>
    <circle cx="76" cy="28" r="4" fill="#F4C430" stroke="none"/>
    <path d="M110 60 Q116 42 124 28"/>
    <circle cx="124" cy="28" r="4" fill="#F4C430" stroke="none"/>
  </g>
</svg>
