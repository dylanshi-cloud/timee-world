<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timee — HTML Templates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#FAF7F2;--bg-alt:#F3EDE4;--text:#2D3436;--text-light:#7A7A7A;--accent:#C8925A;--accent-light:#E8D5B7;--serif:'Playfair Display',Georgia,serif;--sans:'Inter',sans-serif;--ease:cubic-bezier(0.22,1,0.36,1)}
    html,body{height:100%}
    body{font-family:var(--sans);font-weight:300;font-size:1rem;color:var(--text);background:var(--bg);display:flex;flex-direction:column}
    a{text-decoration:none;color:inherit}

    /* TOP BAR */
    .topbar{display:flex;align-items:center;padding:0.6rem 1rem;background:#fff;border-bottom:1px solid rgba(0,0,0,0.04);gap:0.8rem;flex-shrink:0}
    .topbar__logo{font-family:var(--serif);font-size:1.1rem;margin-right:auto}
    .topbar__title{font-size:0.85rem;color:var(--text-light)}
    .topbar select{padding:0.3rem 0.6rem;font-size:0.8rem;border:1px solid rgba(0,0,0,0.08);border-radius:4px;background:#fff;font-family:var(--sans);outline:none;cursor:pointer}
    .topbar select:focus{border-color:var(--accent)}
    .topbar__btn{padding:0.3rem 0.8rem;font-size:0.7rem;letter-spacing:0.05em;text-transform:uppercase;border:1px solid rgba(0,0,0,0.1);border-radius:4px;background:transparent;cursor:pointer;transition:all 0.2s;color:var(--text-light)}
    .topbar__btn:hover{border-color:var(--accent);color:var(--accent)}

    /* IFRAME */
    .preview{flex:1;display:flex;flex-direction:column;background:#fff}
    .preview iframe{width:100%;flex:1;border:none}
    .preview__placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-light);gap:1rem;background:linear-gradient(135deg,#FAF7F2,#F3EDE4)}
    .preview__placeholder p{font-size:0.9rem}
    .preview__placeholder small{font-size:0.75rem;color:var(--text-muted)}

    /* INTRO OVERLAY on first load */
    .intro{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1E1E1E,#2D3436);color:#fff;text-align:center;transition:opacity 0.6s var(--ease)}
    .intro.hide{opacity:0;pointer-events:none}
    .intro h1{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);font-weight:400;margin-bottom:0.5rem}
    .intro p{opacity:0.5;max-width:400px;margin-bottom:2rem;font-size:0.9rem}
    .intro__grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;max-width:600px;width:90%}
    .intro__btn{padding:0.8rem;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);cursor:pointer;transition:all 0.3s;font-size:0.8rem;color:rgba(255,255,255,0.6)}
    .intro__btn:hover{background:rgba(255,255,255,0.08);border-color:var(--accent);color:#fff}

    @media(max-width:768px){.intro__grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar__logo">tim<span style="font-style:italic;opacity:0.7">ee</span></span>
    <span class="topbar__title" id="currentLabel">Select a template to preview</span>
    <select id="templateSelect">
      <option value="">— Choose a template —</option>
      <option value="https://dylanshi-cloud.github.io/ethereal-template/">Ethereal</option>
      <option value="https://dylanshi-cloud.github.io/glass-template/">Glass</option>
      <option value="https://dylanshi-cloud.github.io/aurora-template/">Aurora</option>
      <option value="https://dylanshi-cloud.github.io/noir-template/">Noir</option>
      <option value="https://dylanshi-cloud.github.io/bento-template/">Bento</option>
      <option value="https://dylanshi-cloud.github.io/cinema-template/">Cinema</option>
      <option value="https://dylanshi-cloud.github.io/cyber-template/">Cyber</option>
      <option value="https://dylanshi-cloud.github.io/ember-template/">Ember</option>
    </select>
    <button class="topbar__btn" id="openBtn" disabled>Open in New Tab</button>
  </div>

  <!-- PREVIEW AREA -->
  <div class="preview">
    <div class="preview__placeholder" id="placeholder">
      <p style="font-family:var(--serif);font-size:2rem;color:var(--accent-light)">✦</p>
      <p>Select a template from the dropdown above</p>
      <small>Or click a template below to preview instantly</small>
    </div>
    <iframe id="previewFrame" style="display:none"></iframe>
  </div>

  <!-- INTRO / QUICK PICK -->
  <div class="intro" id="intro">
    <h1>✦ Preview templates</h1>
    <p>Click any template to see it live instantly. No download needed.</p>
    <div class="intro__grid">
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/ethereal-template/">Ethereal</div>
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/glass-template/">Glass</div>
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/aurora-template/">Aurora</div>
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/noir-template/">Noir</div>
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/bento-template/">Bento</div>
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/cinema-template/">Cinema</div>
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/cyber-template/">Cyber</div>
      <div class="intro__btn" data-url="https://dylanshi-cloud.github.io/ember-template/">Ember</div>
    </div>
  </div>

  <script>
    const frame = document.getElementById('previewFrame');
    const placeholder = document.getElementById('placeholder');
    const select = document.getElementById('templateSelect');
    const label = document.getElementById('currentLabel');
    const openBtn = document.getElementById('openBtn');
    const intro = document.getElementById('intro');

    const names = {
      'https://dylanshi-cloud.github.io/ethereal-template/': 'Ethereal',
      'https://dylanshi-cloud.github.io/glass-template/': 'Glass',
      'https://dylanshi-cloud.github.io/aurora-template/': 'Aurora',
      'https://dylanshi-cloud.github.io/noir-template/': 'Noir',
      'https://dylanshi-cloud.github.io/bento-template/': 'Bento',
      'https://dylanshi-cloud.github.io/cinema-template/': 'Cinema',
      'https://dylanshi-cloud.github.io/cyber-template/': 'Cyber',
      'https://dylanshi-cloud.github.io/ember-template/': 'Ember'
    };

    let currentUrl = '';

    function loadPreview(url) {
      if (!url) return;
      currentUrl = url;
      const name = names[url] || 'Template';
      label.textContent = name;
      placeholder.style.display = 'none';
      frame.style.display = 'block';
      frame.src = url;
      openBtn.disabled = false;
      select.value = url;
      intro.classList.add('hide');
    }

    // Dropdown change
    select.addEventListener('change', function() {
      if (this.value) loadPreview(this.value);
    });

    // Intro buttons
    document.querySelectorAll('.intro__btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        loadPreview(this.dataset.url);
      });
    });

    // Open in new tab
    openBtn.addEventListener('click', function() {
      if (currentUrl) window.open(currentUrl, '_blank');
    });
  </script>
</body>
</html>
