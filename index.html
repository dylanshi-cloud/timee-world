<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timee — Premium HTML Templates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Satoshi:wght@400;500;700&family=Work+Sans:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#FAF7F2;--bg-alt:#F3EDE4;--bg-dark:#1E1E1E;--text:#2D3436;--text-light:#7A7A7A;--accent:#C8925A;--accent-light:#E8D5B7;--serif:'Playfair Display',Georgia,serif;--sans:'Inter',sans-serif;--ease:cubic-bezier(0.22,1,0.36,1)}
    html{scroll-behavior:smooth}
    body{font-family:var(--sans);font-weight:300;font-size:1rem;color:var(--text);background:var(--bg)}
    .container{max-width:1100px;margin:0 auto;padding:0 clamp(1.25rem,4vw,2.5rem)}
    a{text-decoration:none;color:inherit}
    .btn{display:inline-block;padding:0.75rem 2rem;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.3s var(--ease)}
    .btn--primary{background:var(--accent);color:#fff}
    .btn--primary:hover{background:var(--accent-dark)}
    .btn--outline{border:1px solid var(--text);color:var(--text);background:transparent}
    .btn--outline:hover{background:var(--text);color:#fff}

    .nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:1.2rem 0;background:rgba(250,247,242,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.04)}
    .nav__inner{display:flex;align-items:center;justify-content:space-between}
    .nav__logo{font-family:var(--serif);font-size:1.4rem}

    .hero{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;position:relative;overflow:hidden}
    .hero__bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(200,146,90,0.12),transparent),radial-gradient(ellipse 60% 80% at 20% 80%,rgba(200,146,90,0.06),transparent),linear-gradient(135deg,#1E1E1E,#2D3436,#1E1E1E);z-index:0}
    .hero__particles{position:absolute;inset:0;z-index:1;pointer-events:none}
    .hero__content{position:relative;z-index:2;padding:5rem 0}
    .hero h1{font-family:var(--serif);font-size:clamp(2rem,4.5vw,3.5rem);font-weight:400;line-height:1.1;margin-bottom:0.8rem;opacity:0;animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.3s forwards}
    .hero p{opacity:0;max-width:420px;margin:0 auto 1.5rem;font-size:0.95rem;animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.7s forwards}
    .hero .btn{opacity:0;animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 1.1s forwards}
    .hero__scroll{opacity:0;animation:fadeIn 1s ease-out 2s forwards;position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25)}
    .hero__scroll-line{width:1px;height:30px;background:linear-gradient(to bottom,rgba(255,255,255,0.4),transparent);margin:0.4rem auto 0;animation:scrollPulse 2s ease-in-out infinite}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scrollPulse{0%,100%{opacity:1}50%{opacity:0.2}}

    section{padding:clamp(3rem,5vw,4rem) 0}

    /* ===== TEMPLATES ===== */
    .section-title{font-family:var(--serif);font-size:clamp(1.5rem,2.5vw,2rem);font-weight:400;margin-bottom:2rem;text-align:center}

    .templates{display:flex;flex-direction:column;gap:2.5rem}

    .template{display:grid;grid-template-columns:1.2fr 1fr;gap:2.5rem;background:#fff;border:1px solid rgba(0,0,0,0.04);overflow:hidden;transition:all 0.6s cubic-bezier(0.22,1,0.36,1);opacity:0;transform:translateY(30px)}
    .template.visible{opacity:1;transform:translateY(0)}
    .template:hover{box-shadow:0 12px 40px rgba(0,0,0,0.06);transform:translateY(-4px)}
    .template:hover.visible{transform:translateY(-4px)}
    .template__preview{position:relative;aspect-ratio:4/3;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .template__preview:hover .template__live{opacity:1}
    .template__live{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s;backdrop-filter:blur(2px);color:#fff;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase}
    .template__info{padding:2rem 2rem 2rem 0;display:flex;flex-direction:column;justify-content:center}
    .template__name{font-family:var(--serif);font-size:1.5rem;margin-bottom:0.3rem}
    .template__price{font-family:var(--serif);font-size:1.1rem;color:var(--accent);margin-bottom:0.8rem}
    .template__price small{font-size:0.75rem;color:var(--text-muted);font-family:var(--sans)}
    .template__desc{font-size:0.85rem;color:var(--text-light);line-height:1.7;margin-bottom:0.8rem}
    .template__tags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:1rem}
    .template__tags span{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.05em;padding:0.2rem 0.5rem;background:var(--bg);color:var(--text-muted);border:1px solid rgba(0,0,0,0.04)}
    .template__actions{display:flex;gap:0.6rem}
    .template__actions .btn{padding:0.5rem 1.5rem;font-size:0.75rem}

    /* ===== DESIGN SNIPPET - shows actual template style ===== */
    .ds{width:100%;height:100%;display:flex;flex-direction:column}
    .ds__preview{flex:1;padding:clamp(12px,2vw,24px);display:flex;flex-direction:column;gap:clamp(4px,0.6vw,10px)}
    /* Ethereal */
    .ds-ethereal{background:#1E1E1E}
    .ds-ethereal .ds__nav{display:flex;justify-content:space-between;margin-bottom:clamp(6px,1vw,14px)}
    .ds-ethereal .ds__nav span{font-family:'Playfair Display',serif;color:#C8925A;font-size:clamp(8px,1.2vw,16px)}
    .ds-ethereal .ds__nav div{display:flex;gap:clamp(6px,1vw,14px)}
    .ds-ethereal .ds__nav div i{width:clamp(20px,3vw,50px);height:2px;background:rgba(255,255,255,0.15);display:block;margin-top:clamp(6px,0.8vw,12px)}
    .ds-ethereal .ds__hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:clamp(3px,0.5vw,8px)}
    .ds-ethereal .ds__hero h2{font-family:'Playfair Display',serif;color:#fff;font-size:clamp(10px,1.5vw,22px);font-weight:400;line-height:1.2}
    .ds-ethereal .ds__hero p{font-size:clamp(6px,0.8vw,11px);color:rgba(255,255,255,0.3)}
    .ds-ethereal .ds__hero span{display:inline-block;border:1px solid rgba(255,255,255,0.2);padding:clamp(2px,0.3vw,6px) clamp(6px,0.8vw,14px);font-size:clamp(5px,0.6vw,9px);color:rgba(255,255,255,0.4);letter-spacing:0.05em}

    /* Glass */
    .ds-glass{background:linear-gradient(135deg,#0F1118,#1a1d2e)}
    .ds-glass .ds__nav{height:clamp(10px,1.5vw,22px);background:rgba(255,255,255,0.04);backdrop-filter:blur(4px);border-radius:4px;margin-bottom:clamp(4px,0.6vw,10px);display:flex;align-items:center;padding:0 clamp(6px,0.8vw,14px);gap:clamp(4px,0.5vw,8px)}
    .ds-glass .ds__nav dot{width:clamp(4px,0.5vw,8px);height:clamp(4px,0.5vw,8px);border-radius:50%;display:block}
    .ds-glass .ds__nav bar{height:2px;background:rgba(255,255,255,0.06);flex:1;border-radius:2px}
    .ds-glass .ds__hero{flex:1;display:flex;align-items:center;justify-content:center;gap:clamp(4px,0.6vw,10px)}
    .ds-glass .ds__card{background:rgba(255,255,255,0.04);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.06);border-radius:clamp(4px,0.6vw,10px);padding:clamp(6px,0.8vw,14px);flex:1;height:80%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .ds-glass .ds__card span{font-size:clamp(6px,0.8vw,12px);color:rgba(255,255,255,0.3)}
    .ds-glass .ds__card b{width:clamp(20px,3vw,50px);height:clamp(3px,0.4vw,6px);background:rgba(99,102,241,0.3);border-radius:2px;margin-top:clamp(3px,0.3vw,6px)}

    /* Aurora */
    .ds-aurora{background:#0B0A1A;position:relative;overflow:hidden}
    .ds-aurora::before{content:'';position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:conic-gradient(from 0deg,#7C3AED,#EC4899,#06B6D4,#7C3AED);animation:spin 8s linear infinite;opacity:0.12}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ds-aurora .ds__inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .ds-aurora .ds__inner h3{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(10px,1.4vw,20px);background:linear-gradient(135deg,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .ds-aurora .ds__inner p{font-size:clamp(5px,0.6vw,10px);color:rgba(255,255,255,0.3);margin-top:clamp(2px,0.3vw,5px)}

    /* Noir */
    .ds-noir{background:#0A0A0A;position:relative}
    .ds-noir::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(201,169,78,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,78,0.04) 1px,transparent 1px);background-size:clamp(8px,1.2vw,20px) clamp(8px,1.2vw,20px)}
    .ds-noir .ds__inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .ds-noir .ds__inner h3{font-family:'DM Serif Display',serif;font-size:clamp(12px,1.6vw,24px);font-style:italic;color:#C9A94E;font-weight:400}
    .ds-noir .ds__inner p{font-size:clamp(5px,0.6vw,10px);color:rgba(255,255,255,0.2);letter-spacing:0.15em;text-transform:uppercase}

    /* Bento */
    .ds-bento{background:#F5F5F0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:clamp(2px,0.3vw,6px);padding:clamp(6px,0.8vw,14px)}
    .ds-bento div{background:#fff;border-radius:clamp(3px,0.4vw,8px);display:flex;align-items:center;justify-content:center;font-size:clamp(5px,0.6vw,10px);color:#2563EB;border:1px solid rgba(37,99,235,0.06)}
    .ds-bento div:nth-child(1){grid-column:span 2;grid-row:span 2}
    .ds-bento div span{font-size:clamp(7px,1vw,16px);font-weight:700;font-family:'Satoshi',sans-serif}

    /* Cinema */
    .ds-cinema{background:#0A0A0A;position:relative;display:flex;align-items:center;justify-content:center}
    .ds-cinema::before,.ds-cinema::after{content:'';position:absolute;left:0;right:0;height:clamp(4px,0.6vw,10px);background:#000;z-index:1}
    .ds-cinema::before{top:0}
    .ds-cinema::after{bottom:0}
    .ds-cinema .ds__inner{text-align:center}
    .ds-cinema .ds__inner h3{font-family:'Work Sans',sans-serif;font-weight:300;font-size:clamp(10px,1.3vw,18px);color:#fff;letter-spacing:0.02em}
    .ds-cinema .ds__inner em{color:#D4A853;font-style:normal}
    .ds-cinema .ds__inner p{font-size:clamp(4px,0.5vw,8px);color:rgba(255,255,255,0.2);margin-top:clamp(2px,0.3vw,5px);letter-spacing:0.2em;text-transform:uppercase}

    /* Cyber */
    .ds-cyber{background:#0A0E17;position:relative;display:flex;align-items:center;justify-content:center}
    .ds-cyber::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(34,211,238,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.03) 1px,transparent 1px);background-size:clamp(6px,0.8vw,14px) clamp(6px,0.8vw,14px)}
    .ds-cyber .ds__inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:clamp(2px,0.3vw,5px)}
    .ds-cyber .ds__inner dot{width:clamp(4px,0.5vw,8px);height:clamp(4px,0.5vw,8px);border-radius:50%;background:#22D3EE;animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .ds-cyber .ds__inner h3{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(9px,1.2vw,18px);background:linear-gradient(135deg,#22D3EE,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .ds-cyber .ds__inner p{font-size:clamp(4px,0.5vw,8px);color:rgba(255,255,255,0.2)}

    /* Ember */
    .ds-ember{background:#FCF8F5;display:flex;align-items:center;justify-content:center}
    .ds-ember .ds__inner{text-align:center}
    .ds-ember .ds__inner h3{font-family:'Fraunces',Georgia,serif;font-size:clamp(10px,1.3vw,20px);font-weight:300;color:#C87A4A}
    .ds-ember .ds__inner p{font-size:clamp(5px,0.6vw,9px);color:rgba(0,0,0,0.15);letter-spacing:0.1em;text-transform:uppercase;margin-top:clamp(2px,0.3vw,5px)}

    /* ===== MODAL ===== */
    .modal{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.85)}
    .modal.open{display:block}
    .modal__bar{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.5rem;color:#fff}
    .modal__bar span{font-size:0.8rem}
    .modal__bar a{font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.5)}
    .modal__bar a:hover{color:#fff}
    .modal__close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer}
    .modal__iframe{width:100%;height:calc(100vh - 50px);border:none;background:#fff}

    .footer{padding:2.5rem 0;text-align:center;border-top:1px solid rgba(0,0,0,0.04);color:var(--text-muted);font-size:0.8rem}

    @media(max-width:768px){
      .template{grid-template-columns:1fr}
      .template__info{padding:1.5rem}
      .template__preview{aspect-ratio:16/9}
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav__inner">
      <a href="#" class="nav__logo">tim<span style="font-style:italic;opacity:0.7">ee</span></a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero__bg"></div>
    <canvas class="hero__particles" id="heroParticles"></canvas>
    <div class="hero__content container">
      <h1>Premium HTML templates.<br/>See them in action.</h1>
      <p>Each template below shows a live preview. Click "Preview Live" to see the full site.</p>
      <a href="#templates" class="btn btn--outline">Browse Collection</a>
      <div class="hero__scroll">scroll<div class="hero__scroll-line"></div></div>
    </div>
  </section>

  <section id="templates">
    <div class="container">
      <h2 class="section-title">✦ 8 templates, 8 distinct styles</h2>
      <div class="templates" id="templateList"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p style="font-family:var(--serif);font-size:1.2rem">tim<span style="font-style:italic;opacity:0.7">ee</span></p>
      <p style="margin-top:0.2rem">Premium HTML templates. Zero dependencies.</p>
    </div>
  </footer>

  <div class="modal" id="previewModal">
    <div class="modal__bar">
      <span id="modalTitle">Preview</span>
      <div style="display:flex;gap:1rem;align-items:center">
        <a href="#" id="modalOpen" target="_blank">Open in new tab →</a>
        <button class="modal__close" id="modalClose">&times;</button>
      </div>
    </div>
    <iframe class="modal__iframe" id="modalIframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>

  <script>
    // === HERO PARTICLES ===
    const canvas = document.getElementById('heroParticles');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let particles = [], animId;
      const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
      const init = () => {
        particles = [];
        const count = Math.min(40, Math.floor(canvas.width / 14));
        for (let i = 0; i < count; i++) particles.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          size: Math.random() * 2.2 + 0.5, speedY: -(Math.random() * 0.2 + 0.06),
          speedX: (Math.random() - 0.5) * 0.12, opacity: Math.random() * 0.3 + 0.04,
          glow: Math.random() > 0.6
        });
      };
      const draw = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of particles) {
          p.y += p.speedY; p.x += p.speedX;
          if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
          if (p.x < -10) p.x = canvas.width + 10; if (p.x > canvas.width + 10) p.x = -10;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.opacity})`; ctx.fill();
          if (p.glow && p.size > 1.2) {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200,146,90,${p.opacity * 0.1})`; ctx.fill();
          }
        }
        animId = requestAnimationFrame(draw);
      };
      resize(); init(); draw();
      window.addEventListener('resize', () => { resize(); init(); });
      window.addEventListener('beforeunload', () => cancelAnimationFrame(animId));
    }

    // === SCROLL REVEAL ===
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.08 });
    document.querySelectorAll('.template').forEach((el, i) => { observer.observe(el); el.style.transitionDelay = `${i * 0.12}s`; });
  </script>
  <script>
    const data = [
      { name:"Ethereal", price:"¥299", usd:"$39", cls:"ds-ethereal", demo:"https://dylanshi-cloud.github.io/ethereal-template/", buy:"https://github.com/dylanshi-cloud/ethereal-template#-pricing", desc:"Warm gold on dark. Canvas particles, scroll reveals, cursor glow, and 5 complete color themes.", tags:["Warm","Gold","Particles","5 Themes"] },
      { name:"Glass", price:"¥199", usd:"$29", cls:"ds-glass", demo:"https://dylanshi-cloud.github.io/glass-template/", buy:"https://github.com/dylanshi-cloud/glass-template#-pricing", desc:"Apple-style glassmorphism. Frosted cards, fluid gradients, floating orbs, built-in dark mode.", tags:["Glassmorphism","Frosted","Dark Mode"] },
      { name:"Aurora", price:"¥199", usd:"$29", cls:"ds-aurora", demo:"https://dylanshi-cloud.github.io/aurora-template/", buy:"https://github.com/dylanshi-cloud/aurora-template#-pricing", desc:"Flowing aurora gradients on a dark canvas. Purple-to-pink-to-cyan for creative brands.", tags:["Gradient","Dark","Vibrant","Neon"] },
      { name:"Noir", price:"¥199", usd:"$29", cls:"ds-noir", demo:"https://dylanshi-cloud.github.io/noir-template/", buy:"https://github.com/dylanshi-cloud/noir-template#-pricing", desc:"Dark luxury with gold accents. Grid background, serif typography, editorial elegance.", tags:["Dark","Gold","Luxury","Editorial"] },
      { name:"Bento", price:"¥199", usd:"$29", cls:"ds-bento", demo:"https://dylanshi-cloud.github.io/bento-template/", buy:"https://github.com/dylanshi-cloud/bento-template#-pricing", desc:"Japanese bento-grid layout. Modular asymmetric cards for portfolios and content-rich sites.", tags:["Grid","Modular","Portfolio","Clean"] },
      { name:"Cinema", price:"¥199", usd:"$29", cls:"ds-cinema", demo:"https://dylanshi-cloud.github.io/cinema-template/", buy:"https://github.com/dylanshi-cloud/cinema-template#-pricing", desc:"Widescreen storytelling. Letterbox bars, narrative scroll, warm golden hour lighting.", tags:["Cinematic","Narrative","Dark","Widescreen"] },
      { name:"Cyber", price:"¥199", usd:"$29", cls:"ds-cyber", demo:"https://dylanshi-cloud.github.io/cyber-template/", buy:"https://github.com/dylanshi-cloud/cyber-template#-pricing", desc:"Dark tech with neon cyan. Grid overlay, glowing stats, built for SaaS and startups.", tags:["Tech","Neon","SaaS","Dark"] },
      { name:"Ember", price:"¥199", usd:"$29", cls:"ds-ember", demo:"https://dylanshi-cloud.github.io/ember-template/", buy:"https://github.com/dylanshi-cloud/ember-template#-pricing", desc:"Warm terracotta for artisan brands. Product grid, story sections, organic earthy palette.", tags:["Warm","Terracotta","Artisan","Product"] }
    ];

    const list = document.getElementById('templateList');
    data.forEach((t,i) => {
      const div = document.createElement('div');
      div.className = 'template';
      div.innerHTML = `
        <div class="template__preview" data-demo="${t.demo}" data-name="${t.name}">
          <div class="ds ${t.cls}">${previewContent(t.cls,t.name)}</div>
          <div class="template__live">✦ Click to Preview Live</div>
        </div>
        <div class="template__info">
          <div class="template__name">${t.name}</div>
          <div class="template__price">${t.price} <small>${t.usd}</small></div>
          <div class="template__desc">${t.desc}</div>
          <div class="template__tags">${t.tags.map(t=>`<span>${t}</span>`).join('')}</div>
          <div class="template__actions">
            <a href="#" class="btn btn--outline preview-btn" data-demo="${t.demo}" data-name="${t.name}">Preview Live</a>
            <a href="${t.buy}" class="btn btn--primary" target="_blank">Buy</a>
          </div>
        </div>
      `;
      list.appendChild(div);
    });

    function previewContent(cls, name) {
      const html = {
        'ds-ethereal':'<div class="ds__preview"><div class="ds__nav"><span>ethereal</span><div><i></i><i></i><i></i></div></div><div class="ds__hero"><h2>Timeless beauty</h2><p>Crafted for those who appreciate the finer details.</p><span>Explore</span></div></div>',
        'ds-glass':'<div class="ds__preview"><div class="ds__nav"><dot style="background:#ff5f57"></dot><dot style="background:#ffbd2e"></dot><dot style="background:#28c840"></dot><bar></bar></div><div class="ds__hero"><div class="ds__card"><span>✦</span><b></b></div><div class="ds__card"><span>◆</span><b></b></div><div class="ds__card"><span>◇</span><b></b></div></div></div>',
        'ds-aurora':'<div class="ds__inner"><h3>Aurora</h3><p>Colors that flow like light</p></div>',
        'ds-noir':'<div class="ds__inner"><h3>Noir</h3><p>Luxury lives in the dark</p></div>',
        'ds-bento':'<div><span>✦</span></div><div>01</div><div>02</div><div>03</div>',
        'ds-cinema':'<div class="ds__inner"><h3>Every brand has a story worth <em>telling</em></h3><p>A cinematic html template</p></div>',
        'ds-cyber':'<div class="ds__inner"><dot></dot><h3>Built for the future</h3><p>Dark tech template</p></div>',
        'ds-ember':'<div class="ds__inner"><h3>Ember</h3><p>Warmth that lingers</p></div>'
      };
      return html[cls] || '';
    }

    // Modal
    const modal = document.getElementById('previewModal');
    const iframe = document.getElementById('modalIframe');
    const modalTitle = document.getElementById('modalTitle');
    const modalClose = document.getElementById('modalClose');
    const modalOpen = document.getElementById('modalOpen');

    document.addEventListener('click', e => {
      const btn = e.target.closest('[data-demo]');
      if (btn) {
        e.preventDefault();
        iframe.src = '';
        modal.classList.add('open');
        modalTitle.textContent = btn.dataset.name;
        modalOpen.href = btn.dataset.demo;
        iframe.src = btn.dataset.demo;
        document.body.style.overflow = 'hidden';
      }
    });

    modalClose.onclick = () => { modal.classList.remove('open'); iframe.src = ''; document.body.style.overflow = ''; };
    modal.onclick = e => { if(e.target === modal) { modal.classList.remove('open'); iframe.src = ''; document.body.style.overflow = ''; } };
    document.addEventListener('keydown', e => { if(e.key === 'Escape') { modal.classList.remove('open'); iframe.src = ''; document.body.style.overflow = ''; } });
  </script>
</body>
</html>
