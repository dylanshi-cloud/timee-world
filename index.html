<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timee — HTML Templates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#FAF7F2;--bg-alt:#F3EDE4;--bg-dark:#1E1E1E;--text:#2D3436;--text-light:#7A7A7A;--accent:#C8925A;--accent-light:#E8D5B7;--serif:'Playfair Display',Georgia,serif;--sans:'Inter',sans-serif;--ease:cubic-bezier(0.22,1,0.36,1)}
    html{scroll-behavior:smooth}
    body{font-family:var(--sans);font-weight:300;font-size:1rem;color:var(--text);background:var(--bg);overflow-x:hidden}
    .container{max-width:1100px;margin:0 auto;padding:0 1.5rem}
    a{text-decoration:none;color:inherit}
    .nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:1.2rem 0;background:rgba(250,247,242,0.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.04)}
    .nav__inner{display:flex;align-items:center;justify-content:space-between}
    .nav__logo{font-family:var(--serif);font-size:1.4rem}

    .hero{position:relative;min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;overflow:hidden}
    .hero__bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(200,146,90,0.12),transparent),radial-gradient(ellipse 60% 80% at 20% 80%,rgba(200,146,90,0.06),transparent),linear-gradient(135deg,#1E1E1E,#2D3436,#1E1E1E);z-index:0}
    .hero__content{position:relative;z-index:1;padding:5rem 0}
    .hero h1{font-family:var(--serif);font-size:clamp(2rem,4.5vw,3.5rem);font-weight:400;line-height:1.1;margin-bottom:0.8rem}
    .hero p{max-width:400px;margin:0 auto 1.5rem;font-size:0.95rem;color:rgba(255,255,255,0.5)}
    .btn{display:inline-block;padding:0.8rem 2rem;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all 0.3s var(--ease)}
    .btn--outline{border:1px solid rgba(255,255,255,0.3);color:#fff;background:transparent}
    .btn--outline:hover{background:#fff;color:#1E1E1E}

    section{padding:clamp(3rem,5vw,4rem) 0}

    .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem}
    .card{background:#fff;border:1px solid rgba(0,0,0,0.04);overflow:hidden;transition:opacity 0.5s var(--ease),transform 0.5s var(--ease)}
    .card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.04);transform:translateY(-3px)}

    .card__preview{aspect-ratio:16/10;overflow:hidden;display:block;position:relative;color:#fff}
    .card__preview:hover .card__play{opacity:1}
    .card__preview:hover .card__label{opacity:1}
    .card__name-overlay{position:absolute;bottom:1rem;left:1rem;font-family:var(--serif);font-size:clamp(1rem,1.5vw,1.3rem);z-index:1}
    .card__play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:1.2rem;opacity:0;transition:opacity 0.3s;z-index:2}
    .card__label{position:absolute;top:0.8rem;right:0.8rem;padding:0.2rem 0.6rem;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.05em;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);border-radius:3px;opacity:0;transition:opacity 0.3s;z-index:2}

    .card__body{padding:1rem 1.2rem 1.2rem}
    .card__name{font-family:var(--serif);font-size:1.05rem;margin-bottom:0.3rem}
    .card__desc{font-size:0.8rem;color:var(--text-light);line-height:1.5}

    .footer{padding:2.5rem 0;text-align:center;border-top:1px solid rgba(0,0,0,0.04);color:var(--text-muted);font-size:0.8rem}

    @media(max-width:768px){.list{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav__inner">
      <a href="#" class="nav__logo">tim<span style="font-style:italic;opacity:0.7">ee</span></a>
      <div style="font-size:0.8rem;color:var(--text-light);letter-spacing:0.05em">HTML Templates</div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__content container">
      <h1>Premium HTML templates.<br/>Click to view live.</h1>
      <p>8 templates, each with a distinct style. Click any one to see it in action.</p>
      <a href="#list" class="btn btn--outline">Browse →</a>
    </div>
  </section>

  <section id="list">
    <div class="container">
      <h2 style="font-family:var(--serif);font-size:clamp(1.3rem,2.5vw,1.8rem);text-align:center;margin-bottom:2rem;font-weight:400">✦ Click any template to see the live site</h2>
      <div class="list" id="grid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p style="font-family:var(--serif);font-size:1.1rem">tim<span style="font-style:italic;opacity:0.7">ee</span></p>
      <p style="font-size:0.8rem;margin-top:0.2rem">Free HTML templates. Click to preview.</p>
    </div>
  </footer>

  <script>
    const T = [
      {n:"Ethereal",c:"#C8925A",url:"https://dylanshi-cloud.github.io/ethereal-template/",bg:"linear-gradient(135deg,#1E1E1E,#2D3436)"},
      {n:"Glass",c:"#6366F1",url:"https://dylanshi-cloud.github.io/glass-template/",bg:"linear-gradient(135deg,#0F1118,#1a1d2e)"},
      {n:"Aurora",c:"#7C3AED",url:"https://dylanshi-cloud.github.io/aurora-template/",bg:"linear-gradient(135deg,#0B0A1A,#1a0533)"},
      {n:"Noir",c:"#C9A94E",url:"https://dylanshi-cloud.github.io/noir-template/",bg:"linear-gradient(135deg,#0A0A0A,#1A1A1A)"},
      {n:"Bento",c:"#2563EB",url:"https://dylanshi-cloud.github.io/bento-template/",bg:"linear-gradient(135deg,#F5F5F0,#e8e8e0)"},
      {n:"Cinema",c:"#D4A853",url:"https://dylanshi-cloud.github.io/cinema-template/",bg:"linear-gradient(135deg,#0A0A0A,#1A1410)"},
      {n:"Cyber",c:"#22D3EE",url:"https://dylanshi-cloud.github.io/cyber-template/",bg:"linear-gradient(135deg,#0A0E17,#1E293B)"},
      {n:"Ember",c:"#C87A4A",url:"https://dylanshi-cloud.github.io/ember-template/",bg:"linear-gradient(135deg,#FCF8F5,#F5EDE8)"}
    ];

    const grid = document.getElementById('grid');
    T.forEach(t => {
      const a = document.createElement('a');
      a.href = t.url;
      a.target = '_blank';
      a.className = 'card';
      a.innerHTML =
        '<div class="card__preview" style="background:' + t.bg + '">' +
          '<div class="card__name-overlay" style="color:' + t.c + '">' + t.n + '</div>' +
          '<div class="card__play">▶</div>' +
          '<div class="card__label" style="color:' + t.c + '">View Live</div>' +
        '</div>' +
        '<div class="card__body">' +
          '<div class="card__name">' + t.n + '</div>' +
          '<div class="card__desc">Click to view the live demo →</div>' +
        '</div>';
      grid.appendChild(a);
    });
  </script>
</body>
</html>
