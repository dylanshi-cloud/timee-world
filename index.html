<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timee — HTML Templates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#FAF7F2;--text:#2D3436;--text-light:#7A7A7A;--accent:#C8925A;--serif:'Playfair Display',Georgia,serif;--sans:'Inter',sans-serif;--ease:cubic-bezier(0.22,1,0.36,1)}
    html{scroll-behavior:smooth}
    body{font-family:var(--sans);font-weight:300;color:var(--text);background:var(--bg)}
    .container{max-width:1200px;margin:0 auto;padding:0 2rem}
    a{text-decoration:none;color:inherit}

    .hero{text-align:center;padding:6rem 0 3rem}
    .hero__mark{font-family:var(--serif);font-size:0.8rem;font-style:italic;color:var(--accent);letter-spacing:0.3em;margin-bottom:1.5rem}
    .hero h1{font-family:var(--serif);font-size:clamp(2.2rem,4vw,3.2rem);font-weight:400;margin-bottom:0.5rem}
    .hero p{color:var(--text-light);max-width:420px;margin:0 auto;font-size:0.9rem;line-height:1.6}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:1.5rem;padding-bottom:4rem}
    .card{background:#fff;border:1px solid rgba(0,0,0,0.04);overflow:hidden;transition:all 0.4s var(--ease)}
    .card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.04)}
    .card__img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;transition:transform 0.5s var(--ease)}
    .card:hover .card__img{transform:scale(1.02)}
    .card__body{padding:1.2rem 1.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
    .card__name{font-family:var(--serif);font-size:1.1rem}
    .card__arrow{font-size:1rem;color:var(--text-light);transition:all 0.3s}
    .card:hover .card__arrow{color:var(--accent);transform:translateX(4px)}

    .footer{padding:2rem 0;text-align:center;border-top:1px solid rgba(0,0,0,0.04);color:var(--text-muted);font-size:0.75rem}
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero__mark">timee</div>
    <h1>✦ HTML Templates</h1>
    <p>Click any template to see it live. Each one is a complete, ready-to-use brand site.</p>
  </div>

  <div class="container">
    <div class="grid">
      <a href="https://dylanshi-cloud.github.io/ethereal-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-ethereal.png" alt="Ethereal" loading="lazy" />
        <div class="card__body"><span class="card__name">Ethereal</span><span class="card__arrow">→</span></div>
      </a>
      <a href="https://dylanshi-cloud.github.io/glass-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-glass.png" alt="Glass" loading="lazy" />
        <div class="card__body"><span class="card__name">Glass</span><span class="card__arrow">→</span></div>
      </a>
      <a href="https://dylanshi-cloud.github.io/aurora-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-aurora.png" alt="Aurora" loading="lazy" />
        <div class="card__body"><span class="card__name">Aurora</span><span class="card__arrow">→</span></div>
      </a>
      <a href="https://dylanshi-cloud.github.io/noir-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-noir.png" alt="Noir" loading="lazy" />
        <div class="card__body"><span class="card__name">Noir</span><span class="card__arrow">→</span></div>
      </a>
      <a href="https://dylanshi-cloud.github.io/bento-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-bento.png" alt="Bento" loading="lazy" />
        <div class="card__body"><span class="card__name">Bento</span><span class="card__arrow">→</span></div>
      </a>
      <a href="https://dylanshi-cloud.github.io/cinema-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-cinema.png" alt="Cinema" loading="lazy" />
        <div class="card__body"><span class="card__name">Cinema</span><span class="card__arrow">→</span></div>
      </a>
      <a href="https://dylanshi-cloud.github.io/cyber-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-cyber.png" alt="Cyber" loading="lazy" />
        <div class="card__body"><span class="card__name">Cyber</span><span class="card__arrow">→</span></div>
      </a>
      <a href="https://dylanshi-cloud.github.io/ember-template/" target="_blank" class="card">
        <img class="card__img" src="images/thumb-ember.png" alt="Ember" loading="lazy" />
        <div class="card__body"><span class="card__name">Ember</span><span class="card__arrow">→</span></div>
      </a>
    </div>
  </div>

  <footer class="footer"><div class="container"><p>Timee — Premium HTML Templates</p></div></footer>
</body>
</html>
